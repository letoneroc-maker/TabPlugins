<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="tabGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7170ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5e6ad2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tabGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4905c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b07840;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#7170ff" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark base rounded square -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="#0f1011"/>

  <!-- Tab shape 1 — back tab (subtle) -->
  <rect x="12" y="16" width="34" height="32" rx="5" fill="#1f1f23" stroke="#34343a" stroke-width="1"/>

  <!-- Tab shape 2 — front tab (main) -->
  <rect x="18" y="20" width="34" height="32" rx="5" fill="#191a1b" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Tab top accent bar — amber for front tab -->
  <rect x="18" y="20" width="34" height="4" rx="2" fill="url(#tabGradLight)"/>

  <!-- Subtle grid lines inside tab suggesting content -->
  <rect x="24" y="30" width="18" height="2" rx="1" fill="rgba(255,255,255,0.12)"/>
  <rect x="24" y="36" width="12" height="2" rx="1" fill="rgba(255,255,255,0.08)"/>
  <rect x="24" y="42" width="14" height="2" rx="1" fill="rgba(255,255,255,0.06)"/>
</svg>